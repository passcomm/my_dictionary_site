<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Voca Player</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 0 auto; background: #f4f4f9; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 10px 0; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .active { background: #007bff; color: white; }
        .start { background: #28a745; color: white; }
        .stop { background: #dc3545; color: white; }
        textarea { width: 100%; height: 80px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; }
        .word-item { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .star { font-size: 24px; color: #ccc; cursor: pointer; margin-right: 10px; }
        .star.selected { color: orange; }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="allTab" class="active" style="flex:1" onclick="setTab('all')">전체</button>
        <button id="selTab" style="flex:1" onclick="setTab('selected')">선별★</button>
    </div>
    <div id="status" style="text-align:center; font-weight:bold; margin-bottom:10px;">준비됨</div>
    <div class="btn-group">
        <button class="start" onclick="play()">시작</button>
        <button style="background:#ffc107" onclick="pause()">일시정지</button>
        <button class="stop" onclick="reset()">종료</button>
    </div>
    <textarea id="input" placeholder="단어 뜻 (한 줄에 하나씩)"></textarea>
    <div style="display:flex; gap:5px;">
        <button style="background:#6c757d; color:white; flex:2" onclick="add()">등록</button>
        <button style="background:#dc3545; color:white; flex:1" onclick="clearAll()">전체삭제</button>
    </div>
    <div id="list"></div>
</div>
<script>
    let words = JSON.parse(localStorage.getItem('myVoca') || '[]');
    let tab = 'all', playing = false, idx = 0, rptIdx = 0;
    const synth = window.speechSynthesis;

    function save() { localStorage.setItem('myVoca', JSON.stringify(words)); render(); }
    function setTab(t) { tab = t; document.getElementById('allTab').className = t==='all'?'active':''; document.getElementById('selTab').className = t==='selected'?'active':''; reset(); render(); }
    function add() { const v = document.getElementById('input').value; if(!v.trim()) return; v.split('\n').filter(l=>l.trim()).forEach(l=>words.push({t:l.trim(), s:false})); document.getElementById('input').value=''; save(); }
    function clearAll() { if(confirm('전부 삭제할까요?')) { words = []; save(); reset(); } }
    function render() {
        const d = document.getElementById('list'); d.innerHTML = '';
        words.forEach((w, i) => {
            if(tab==='selected' && !w.s) return;
            d.innerHTML += `<div class="word-item"><span class="star ${w.s?'selected':''}" onclick="tgl(${i})">★</span><span style="flex:1">${w.t}</span><button onclick="del(${i})" style="padding:5px; font-size:11px;">삭제</button></div>`;
        });
    }
    function tgl(i) { words[i].s = !words[i].s; save(); }
    function del(i) { words.splice(i,1); save(); }
    function play() {
        if(playing) return;
        const list = tab==='all' ? words : words.filter(w=>w.s);
        if(!list.length) return;
        playing = true;
        loop(list);
    }
    function loop(list) {
        if(!playing || idx >= list.length) { if(idx >= list.length) reset(); return; }
        document.getElementById('status').innerText = `${idx+1}번 읽는 중...`;
        const u = new SpeechSynthesisUtterance(list[idx].t);
        u.lang = /[a-zA-Z]/.test(list[idx].t) ? 'en-US' : 'ko-KR';
        u.onend = () => { idx++; setTimeout(()=>loop(list), 500); };
        synth.speak(u);
    }
    function pause() { playing = false; synth.cancel(); document.getElementById('status').innerText = '일시정지'; }
    function reset() { playing = false; synth.cancel(); idx = 0; document.getElementById('status').innerText = '준비됨'; }
    render();
</script>
</body>
</html>
