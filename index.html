<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Category Voca Player PRO v2</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto; background: #f0f2f5; padding: 15px 15px 120px 15px; } 
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .category-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .cat-btn { flex: 1; padding: 12px; border: none; background: #cfd4da; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .cat-btn.active { background: #495057; color: white; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #e4e6eb; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .tab-btn.active { background: #007bff; color: white; }
        .settings { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #eee; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .status-box { text-align: center; background: #ffffff; padding: 20px; border-radius: 15px; margin: 15px 0; border: 2px solid #007bff; box-shadow: inset 0 0 10px rgba(0,123,255,0.05); position: relative; }
        #statusLabel { font-size: 16px; color: #007bff; margin-bottom: 10px; display: block; }
        #progressDetail { font-size: 26px; font-weight: 800; color: #1a1a1a; line-height: 1.4; min-height: 70px; display: flex; align-items: center; justify-content: center; white-space: pre-line; }
        .status-icons { position: absolute; top: 10px; right: 15px; display: flex; gap: 10px; }
        .icon-btn { font-size: 30px; color: #ccc; cursor: pointer; user-select: none; }
        .icon-btn.selected { color: #ffc107; }
        .bookmark-btn.selected { color: #ff5722; }
        .progress-container { width: 100%; margin-top: 15px; }
        #progressBar { width: 100%; height: 12px; cursor: pointer; accent-color: #007bff; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; }
        .controls-wrapper { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.98); padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; display: flex; justify-content: center; }
        .controls { display: grid; grid-template-columns: 0.8fr 1fr 1fr 1fr 0.8fr; gap: 8px; width: 100%; max-width: 570px; }
        button { padding: 15px 5px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; }
        .primary { background: #28a745; color: white; }
        .warning { background: #ffc107; color: black; }
        .danger { background: #dc3545; color: white; }
        .secondary { background: #6c757d; color: white; }
        .move-btn { background: #f0f2f5; color: #333; font-size: 18px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; padding: 12px; font-size: 14px; resize: none; }
        .admin-controls { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 20px; }
        .word-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #fff; }
        .word-text { flex: 1; margin-left: 10px; font-size: 16px; }
        .star { font-size: 28px; color: #ccc; cursor: pointer; }
        .star.selected { color: #ffc107; }
        .del-btn { padding: 5px 10px; font-size: 12px; background: #ffeded; color: #d9534f; border: 1px solid #d9534f; border-radius: 5px; }
        .unselect-btn { padding: 5px 10px; font-size: 12px; background: #f0f0f0; color: #555; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="category-tabs">
        <button class="cat-btn active" id="cat-word" onclick="switchCategory('word')">단어</button>
        <button class="cat-btn" id="cat-coll" onclick="switchCategory('coll')">연어</button>
        <button class="cat-btn" id="cat-idiom" onclick="switchCategory('idiom')">숙어</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btnAll" onclick="switchTab('all')">전체 목록</button>
        <button class="tab-btn" id="btnSelected" onclick="switchTab('selected')">선별(★)</button>
    </div>

    <div class="settings">
        <div class="setting-item">
            <span>반복 횟수</span>
            <select id="repeatCount">
                <option value="1">1회씩</option>
                <option value="2">2회 반복</option>
                <option value="3">3회 반복</option>
            </select>
        </div>
        <div class="setting-item">
            <span>읽기 속도 (<span id="speedVal">1.0</span>x)</span>
            <input type="range" id="readSpeed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('speedVal').innerText=this.value">
        </div>
    </div>

    <div class="status-box">
        <div class="status-icons">
            <span class="icon-btn" id="statusStar" onclick="toggleStatusStar()">★</span>
            <span class="icon-btn bookmark-btn" id="statusBookmark" onclick="toggleBookmark()">🔖</span>
        </div>
        <span id="statusLabel">시스템 준비됨</span>
        <div id="progressDetail">대기 중</div>
        <div class="progress-container">
            <input type="range" id="progressBar" min="0" max="100" value="0" oninput="seekWord(this.value)">
        </div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="현재 목록에서 검색..." oninput="render()">

    <textarea id="bulkInput" placeholder="추가할 내용을 입력하세요"></textarea>
    
    <div class="admin-controls">
        <button class="secondary" id="bulkAddBtn" onclick="addBulkWords()">대량 등록</button>
        <button class="danger" style="background:#ba2121" onclick="clearAllWords()">전체 삭제</button>
    </div>

    <div id="wordListDisplay"></div>
</div>

<div class="controls-wrapper">
    <div class="controls">
        <button class="move-btn" onclick="moveWord(-1)">◀</button>
        <button class="primary" onclick="startReading()">시작</button>
        <button class="warning" onclick="pauseReading()">일시정지</button>
        <button class="danger" onclick="stopReading()">종료</button>
        <button class="move-btn" onclick="moveWord(1)">▶</button>
    </div>
</div>

<script>
    let storage = JSON.parse(localStorage.getItem('vocaMasterData')) || {
        word: { list: [], lastIdx: 0, bookmark: 0 },
        coll: { list: [], lastIdx: 0, bookmark: 0 },
        idiom: { list: [], lastIdx: 0, bookmark: 0 }
    };

    let currentCat = 'word';
    let currentTab = 'all';
    let isReading = false;
    let synth = window.speechSynthesis;
    let currentIdx = 0;
    let currentRepeat = 0;

    function saveStorage() {
        // [수정] 단어(word) 카테고리일 때만 알파벳 정렬 수행
        if (currentCat === 'word') {
            storage[currentCat].list.sort((a, b) => a.text.toLowerCase().localeCompare(b.text.toLowerCase()));
        }
        
        localStorage.setItem('vocaMasterData', JSON.stringify(storage));
        render();
        updateStatus();
    }

    function getActiveList() {
        const fullList = storage[currentCat].list;
        return currentTab === 'all' ? fullList : fullList.filter(w => w.selected);
    }

    function switchCategory(cat) {
        if(isReading) stopReading();
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`cat-${cat}`).classList.add('active');
        currentIdx = storage[currentCat].lastIdx || 0;
        render();
        updateStatus();
    }

    function switchTab(t) {
        if (currentTab === 'all' && t === 'selected') storage[currentCat].lastIdx = currentIdx;
        currentTab = t;
        document.getElementById('btnAll').classList.toggle('active', t === 'all');
        document.getElementById('btnSelected').classList.toggle('active', t === 'selected');
        if(isReading) stopReading();
        currentIdx = (t === 'all') ? (storage[currentCat].lastIdx || 0) : 0;
        render();
        updateStatus();
    }

    function addBulkWords() {
        const input = document.getElementById('bulkInput').value;
        if(!input.trim()) return;
        const lines = input.split('\n').filter(line => line.trim() !== "");
        const existingTexts = new Set(storage[currentCat].list.map(item => item.text));
        
        let addedCount = 0;
        const newWords = [];
        lines.forEach(line => {
            const trimmedLine = line.trim();
            if (!existingTexts.has(trimmedLine)) {
                newWords.push({ text: trimmedLine, selected: false });
                existingTexts.add(trimmedLine);
                addedCount++;
            }
        });

        if (addedCount > 0) {
            storage[currentCat].list = [...storage[currentCat].list, ...newWords];
            document.getElementById('bulkInput').value = '';
            saveStorage(); 
            alert(`${addedCount}개가 추가되었습니다.`);
        } else {
            alert("이미 모든 내용이 등록되어 있습니다.");
        }
    }

    function clearAllWords() {
        if(confirm('이 카테고리를 비울까요?')) {
            stopReading();
            storage[currentCat].list = [];
            storage[currentCat].lastIdx = 0;
            storage[currentCat].bookmark = 0;
            saveStorage();
        }
    }

    function render() {
        const listDiv = document.getElementById('wordListDisplay');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        listDiv.innerHTML = '';
        const fragment = document.createDocumentFragment();
        const fullList = storage[currentCat].list;
        const bookmarkIdx = storage[currentCat].bookmark;

        fullList.forEach((word, index) => {
            if (currentTab === 'selected' && !word.selected) return;
            if (searchTerm && !word.text.toLowerCase().includes(searchTerm)) return;
            
            const item = document.createElement('div');
            item.className = 'word-item';
            const isBookmarked = (index === bookmarkIdx) ? " <span style='color:#ff5722; font-size:12px;'>[🔖]</span>" : "";
            const actionBtn = currentTab === 'all' 
                ? `<button class="del-btn" onclick="deleteItem(${index})">삭제</button>`
                : `<button class="unselect-btn" onclick="toggleSelect(${index})">해제</button>`;
            
            item.innerHTML = `<span class="star ${word.selected ? 'selected' : ''}" onclick="toggleSelect(${index})">★</span>
                <span class="word-text">${word.text}${isBookmarked}</span>
                ${actionBtn}`;
            fragment.appendChild(item);
        });
        listDiv.appendChild(fragment);
    }

    function toggleSelect(i) { storage[currentCat].list[i].selected = !storage[currentCat].list[i].selected; saveStorage(); }
    function deleteItem(i) { if(confirm('삭제할까요?')) { storage[currentCat].list.splice(i, 1); saveStorage(); } }

    function updateStatus() {
        const list = getActiveList();
        const progressBar = document.getElementById('progressBar');
        progressBar.max = list.length > 0 ? list.length - 1 : 0;
        
        if (list.length === 0) {
            document.getElementById('progressDetail').innerText = "목록이 비어 있습니다.";
            progressBar.value = 0;
            document.getElementById('statusStar').style.display = 'none';
            document.getElementById('statusBookmark').style.display = 'none';
        } else {
            document.getElementById('statusStar').style.display = 'inline-block';
            document.getElementById('statusBookmark').style.display = 'inline-block';
            updateUI(list);
        }
    }

    function updateUI(list) {
        if (!list[currentIdx]) currentIdx = 0;
        const item = list[currentIdx];
        const parts = item.text.split(/[ \t]/);
        const english = parts[0];
        const korean = item.text.replace(english, "").trim();
        
        document.getElementById('statusLabel').innerText = `${currentCat.toUpperCase()} (${currentIdx + 1} / ${list.length})`;
        document.getElementById('progressDetail').innerText = `${english}\n${korean}`;
        
        document.getElementById('statusStar').classList.toggle('selected', item.selected);
        const originalIdx = storage[currentCat].list.indexOf(item);
        document.getElementById('statusBookmark').classList.toggle('selected', originalIdx === storage[currentCat].bookmark);
        document.getElementById('progressBar').value = currentIdx;

        if (currentTab === 'all') storage[currentCat].lastIdx = currentIdx;
    }

    function toggleBookmark() {
        const list = getActiveList();
        if (list.length === 0) return;
        storage[currentCat].bookmark = storage[currentCat].list.indexOf(list[currentIdx]);
        saveStorage();
        alert("책갈피를 꽂았습니다.");
    }

    function toggleStatusStar() {
        const list = getActiveList();
        if (list.length === 0) return;
        const oIdx = storage[currentCat].list.indexOf(list[currentIdx]);
        storage[currentCat].list[oIdx].selected = !storage[currentCat].list[oIdx].selected;
        saveStorage();
    }

    function seekWord(val) {
        const list = getActiveList();
        if (list.length === 0) return;
        synth.cancel();
        currentIdx = parseInt(val);
        currentRepeat = 0;
        if (isReading) readNextItem(list);
        else updateUI(list);
    }

    function moveWord(step) {
        const list = getActiveList();
        if (list.length === 0) return;
        synth.cancel();
        currentIdx = (currentIdx + step + list.length) % list.length;
        currentRepeat = 0;
        if (isReading) readNextItem(list);
        else updateUI(list);
    }

    function startReading() {
        if (isReading) return;
        synth.cancel();
        const list = getActiveList();
        if (list.length === 0) return;
        isReading = true;
        readNextItem(list);
    }

    function readNextItem(list) {
        if (!isReading || currentIdx >= list.length) { stopReading(); return; }
        updateUI(list);
        const item = list[currentIdx];
        const parts = item.text.split(/[ \t]/);
        const eng = parts[0];
        const kor = item.text.replace(eng, "").trim();

        const spd = parseFloat(document.getElementById('readSpeed').value);
        const uEng = new SpeechSynthesisUtterance(eng);
        uEng.lang = 'en-US'; uEng.rate = spd;

        uEng.onend = () => {
            if (!isReading) return;
            const uKor = new SpeechSynthesisUtterance(kor);
            uKor.lang = 'ko-KR'; uKor.rate = spd;
            uKor.onend = () => {
                if (!isReading) return;
                currentRepeat++;
                if (currentRepeat < parseInt(document.getElementById('repeatCount').value)) {
                    setTimeout(() => readNextItem(list), 400);
                } else {
                    currentRepeat = 0; currentIdx++;
                    setTimeout(() => readNextItem(list), 800);
                }
            };
            synth.speak(uKor);
        };
        synth.speak(uEng);
    }

    function pauseReading() { isReading = false; synth.cancel(); document.getElementById('statusLabel').innerText = "일시 정지됨"; }
    function stopReading() { isReading = false; currentRepeat = 0; synth.cancel(); document.getElementById('statusLabel').innerText = "시스템 준비됨"; updateStatus(); }

    window.onload = () => {
        currentIdx = storage[currentCat].bookmark || 0;
        render();
        updateStatus();
    };
</script>
</body>
</html>
