<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfect Voice Voca Player PRO</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto; background: #f0f2f5; padding: 15px 15px 120px 15px; } 
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #e4e6eb; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .tab-btn.active { background: #007bff; color: white; }
        .settings { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #eee; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .status-box { text-align: center; background: #ffffff; padding: 20px; border-radius: 15px; margin: 15px 0; border: 2px solid #007bff; box-shadow: inset 0 0 10px rgba(0,123,255,0.05); position: relative; }
        #statusLabel { font-size: 16px; color: #007bff; margin-bottom: 10px; display: block; }
        #progressDetail { font-size: 26px; font-weight: 800; color: #1a1a1a; line-height: 1.4; word-break: keep-all; min-height: 70px; display: flex; align-items: center; justify-content: center; white-space: pre-line; }

        /* 책갈피 및 별표 아이콘 */
        .status-icons { position: absolute; top: 10px; right: 15px; display: flex; gap: 10px; }
        .icon-btn { font-size: 30px; color: #ccc; cursor: pointer; user-select: none; }
        .icon-btn.selected { color: #ffc107; }
        .bookmark-btn.selected { color: #ff5722; }

        /* [기능 1] 슬라이더형 진행 바 */
        .progress-container { width: 100%; margin-top: 15px; }
        #progressBar { width: 100%; height: 12px; cursor: pointer; accent-color: #007bff; }

        /* [기능 3] 검색창 스타일 */
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; }

        .controls-wrapper { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.98); padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; display: flex; justify-content: center; }
        .controls { display: grid; grid-template-columns: 0.8fr 1fr 1fr 1fr 0.8fr; gap: 8px; width: 100%; max-width: 570px; }
        button { padding: 15px 5px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; }
        .primary { background: #28a745; color: white; }
        .warning { background: #ffc107; color: black; }
        .danger { background: #dc3545; color: white; }
        .secondary { background: #6c757d; color: white; }
        .move-btn { background: #f0f2f5; color: #333; font-size: 18px; }
        
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; padding: 12px; font-size: 14px; resize: none; }
        .admin-controls { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 20px; }
        .word-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #fff; }
        .word-text { flex: 1; margin-left: 10px; font-size: 16px; }
        .star { font-size: 28px; color: #ccc; cursor: pointer; }
        .star.selected { color: #ffc107; }
        .del-btn { padding: 5px 10px; font-size: 12px; background: #ffeded; color: #d9534f; border: 1px solid #d9534f; border-radius: 5px; }
        .unselect-btn { padding: 5px 10px; font-size: 12px; background: #f0f0f0; color: #555; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btnAll" onclick="switchTab('all')">전체 목록</button>
        <button class="tab-btn" id="btnSelected" onclick="switchTab('selected')">선별(★)</button>
    </div>

    <div class="settings">
        <div class="setting-item">
            <span>반복 횟수</span>
            <select id="repeatCount">
                <option value="1">1회씩 읽기</option>
                <option value="2">2회 반복</option>
                <option value="3">3회 반복</option>
            </select>
        </div>
        <div class="setting-item">
            <span>읽기 속도 (<span id="speedVal">1.0</span>x)</span>
            <input type="range" id="readSpeed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('speedVal').innerText=this.value">
        </div>
    </div>

    <div class="status-box">
        <div class="status-icons">
            <span class="icon-btn" id="statusStar" onclick="toggleStatusStar()">★</span>
            <span class="icon-btn bookmark-btn" id="statusBookmark" onclick="toggleBookmark()">🔖</span>
        </div>
        <span id="statusLabel">시스템 준비됨</span>
        <div id="progressDetail">대기 중</div>
        <div class="progress-container">
            <input type="range" id="progressBar" min="0" max="100" value="0" oninput="seekWord(this.value)">
        </div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="찾고 싶은 단어나 뜻을 입력하세요..." oninput="render()">

    <textarea id="bulkInput" placeholder="영어단어 뜻 (공백으로 구분, 한 줄에 하나씩)"></textarea>
    
    <div class="admin-controls">
        <button class="secondary" onclick="addBulkWords()">단어 대량 등록</button>
        <button class="danger" style="background:#ba2121" onclick="clearAllWords()">전체 삭제</button>
    </div>

    <div id="wordListDisplay"></div>
</div>

<div class="controls-wrapper">
    <div class="controls">
        <button class="move-btn" onclick="moveWord(-1)">◀</button>
        <button class="primary" onclick="startReading()">시작</button>
        <button class="warning" onclick="pauseReading()">일시정지</button>
        <button class="danger" onclick="stopReading()">종료</button>
        <button class="move-btn" onclick="moveWord(1)">▶</button>
    </div>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('myWords')) || [];
    let bookmarkIdx = JSON.parse(localStorage.getItem('vocaBookmark')) || 0; // [기능 2] 책갈피 위치 로드
    let currentTab = 'all';
    let isReading = false;
    let synth = window.speechSynthesis;
    let currentIdx = bookmarkIdx; // 시작 위치를 책갈피로 설정
    let currentRepeat = 0;

    function save() {
        localStorage.setItem('myWords', JSON.stringify(words));
        render();
        updateStatus();
    }

    function updateStatus() {
        const list = getActiveList();
        const total = list.length;
        const progressBar = document.getElementById('progressBar');
        
        progressBar.max = total > 0 ? total - 1 : 0;
        
        if (!isReading && currentIdx === 0 && words.length === 0) {
            document.getElementById('progressDetail').innerText = `등록된 단어: 0개`;
            progressBar.value = 0;
            document.getElementById('statusStar').style.display = 'none';
            document.getElementById('statusBookmark').style.display = 'none';
        } else {
            document.getElementById('statusStar').style.display = 'inline-block';
            document.getElementById('statusBookmark').style.display = 'inline-block';
            updateUI(list);
        }
    }

    function getActiveList() {
        return currentTab === 'all' ? words : words.filter(w=>w.selected);
    }

    // [기능 2] 책갈피 기능
    function toggleBookmark() {
        const list = getActiveList();
        if (list.length === 0) return;
        
        // 현재 인덱스를 책갈피로 저장 (전체 목록 기준 인덱스를 찾기 위해 가공)
        const currentWord = list[currentIdx];
        const originalIdx = words.indexOf(currentWord);
        
        bookmarkIdx = originalIdx;
        localStorage.setItem('vocaBookmark', JSON.stringify(bookmarkIdx));
        
        render(); // UI 갱신 (책갈피 표시 여부 등)
        alert((originalIdx + 1) + "번 단어에 책갈피를 꽂았습니다. 다음에 열 때 여기서 시작합니다.");
    }

    function toggleStatusStar() {
        const list = getActiveList();
        if (list.length === 0) return;
        const currentWord = list[currentIdx];
        const originalIdx = words.indexOf(currentWord);
        if (originalIdx !== -1) {
            words[originalIdx].selected = !words[originalIdx].selected;
            save();
        }
    }

    // [기능 1] 진행 바 슬라이더 이동 함수
    function seekWord(val) {
        const list = getActiveList();
        if (list.length === 0) return;
        
        synth.cancel();
        currentIdx = parseInt(val);
        currentRepeat = 0;
        
        if (isReading) {
            readNextItem(list);
        } else {
            updateUI(list);
        }
    }

    function switchTab(t) {
        currentTab = t;
        document.getElementById('btnAll').classList.toggle('active', t === 'all');
        document.getElementById('btnSelected').classList.toggle('active', t === 'selected');
        stopReading();
        currentIdx = 0; 
        render();
        updateStatus();
    }

    function addBulkWords() {
        const input = document.getElementById('bulkInput').value;
        if(!input.trim()) return;
        const newLines = input.split('\n').filter(line => line.trim() !== "");
        const newWords = newLines.map(line => ({ text: line.trim(), selected: false }));
        words = [...words, ...newWords];
        document.getElementById('bulkInput').value = '';
        save();
    }

    function clearAllWords() { 
        if(confirm("전체 삭제하시겠습니까?")) { 
            stopReading(); 
            words = []; 
            bookmarkIdx = 0;
            localStorage.removeItem('vocaBookmark');
            save(); 
        } 
    }
    
    function render() {
        const listDiv = document.getElementById('wordListDisplay');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        listDiv.innerHTML = '';
        const fragment = document.createDocumentFragment();
        
        words.forEach((word, index) => {
            if (currentTab === 'selected' && !word.selected) return;
            
            // [기능 3] 검색어 필터링
            if (searchTerm && !word.text.toLowerCase().includes(searchTerm)) return;
            
            const item = document.createElement('div');
            item.className = 'word-item';
            
            // 책갈피 표시 (해당 단어가 책갈피된 위치면 표시)
            const isBookmarked = (index === bookmarkIdx) ? " <span style='color:#ff5722; font-size:12px;'>[🔖책갈피]</span>" : "";
            
            const actionBtn = currentTab === 'all' 
                ? `<button class="del-btn" onclick="deleteWord(${index})">삭제</button>`
                : `<button class="unselect-btn" onclick="toggleSelect(${index})">해제</button>`;
            
            item.innerHTML = `<span class="star ${word.selected ? 'selected' : ''}" onclick="toggleSelect(${index})">★</span>
                <span class="word-text">${word.text}${isBookmarked}</span>
                ${actionBtn}`;
            fragment.appendChild(item);
        });
        listDiv.appendChild(fragment);
    }

    function toggleSelect(i) { words[i].selected = !words[i].selected; save(); }
    function deleteWord(i) { if(confirm('단어장에서 완전히 삭제할까요?')) { words.splice(i, 1); save(); } }

    function startReading() {
        if (isReading) return;
        synth.cancel();
        const list = getActiveList();
        if (list.length === 0) return alert('단어가 없습니다.');
        isReading = true;
        if (currentIdx >= list.length) currentIdx = 0;
        readNextItem(list);
    }

    function moveWord(step) {
        const list = getActiveList();
        if (list.length === 0) return;
        synth.cancel();
        currentIdx += step;
        currentRepeat = 0;
        if (currentIdx < 0) currentIdx = list.length - 1;
        if (currentIdx >= list.length) currentIdx = 0;
        if (isReading) readNextItem(list);
        else updateUI(list);
    }

    function updateUI(list) {
        if (!list[currentIdx]) { currentIdx = 0; return; }
        const currentWord = list[currentIdx];
        const fullText = currentWord.text;
        let english = fullText.split(/[ \t]/)[0]; 
        let korean = fullText.replace(english, "").trim();
        
        document.getElementById('statusLabel').innerText = `단어 학습 중 (${currentIdx + 1} / ${list.length})`;
        document.getElementById('progressDetail').innerText = `${english}\n${korean}`;
        
        // 아이콘 상태 업데이트
        document.getElementById('statusStar').classList.toggle('selected', currentWord.selected);
        const originalIdx = words.indexOf(currentWord);
        document.getElementById('statusBookmark').classList.toggle('selected', originalIdx === bookmarkIdx);

        // 슬라이더 바 업데이트
        document.getElementById('progressBar').value = currentIdx;
    }

    function readNextItem(list) {
        if (!isReading || currentIdx >= list.length) {
            if (currentIdx >= list.length) stopReading();
            return;
        }

        updateUI(list);
        const fullText = list[currentIdx].text;
        let english = fullText.split(/[ \t]/)[0]; 
        let korean = fullText.replace(english, "").trim();

        const spd = parseFloat(document.getElementById('readSpeed').value);
        const utterEng = new SpeechSynthesisUtterance(english);
        utterEng.lang = 'en-US';
        utterEng.rate = spd;

        utterEng.onend = () => {
            if (!isReading) return;
            const utterKor = new SpeechSynthesisUtterance(korean);
            utterKor.lang = 'ko-KR';
            utterKor.rate = spd;
            utterKor.onend = () => {
                if (!isReading) return;
                currentRepeat++;
                if (currentRepeat < parseInt(document.getElementById('repeatCount').value)) {
                    setTimeout(() => readNextItem(list), 400);
                } else {
                    currentRepeat = 0;
                    currentIdx++;
                    setTimeout(() => readNextItem(list), 800);
                }
            };
            synth.speak(utterKor);
        };
        synth.speak(utterEng);
    }

    function pauseReading() { isReading = false; synth.cancel(); document.getElementById('statusLabel').innerText = "일시 정지됨"; }
    function stopReading() { 
        isReading = false; currentRepeat = 0; synth.cancel(); 
        document.getElementById('statusLabel').innerText = "시스템 준비됨"; 
        updateStatus(); 
    }

    window.onload = () => { 
        // 앱을 열었을 때 전체 목록 기준 책갈피 위치로 currentIdx 설정
        if (bookmarkIdx > 0 && bookmarkIdx < words.length) {
            currentIdx = bookmarkIdx;
        }
        render(); 
        updateStatus(); 
    };
</script>
</body>
</html>
